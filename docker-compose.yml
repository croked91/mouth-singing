# Base docker-compose — shared service definitions
# Usage:
#   GPU mode:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#   API mode:  docker compose -f docker-compose.yml -f docker-compose.api.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: karaoke_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: karaoke_backend
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: /data/sqlite/karaoke.db
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      MEDIA_ROOT: /data/media
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - sqlite_data:/data/sqlite
      - media_data:/data/media
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: karaoke_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
  sqlite_data:
  media_data:
  models_data:

networks:
  karaoke_net:
    driver: bridge
