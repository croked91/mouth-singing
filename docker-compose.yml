# Base docker-compose — shared service definitions
# Usage:
#   GPU mode:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  minio:
    image: minio/minio:latest
    container_name: karaoke_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: karaoke_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: karaoke
      POSTGRES_USER: karaoke
      POSTGRES_PASSWORD: ${PG_PASSWORD:-karaoke}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karaoke"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: karaoke_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RMQ_USER:-karaoke}
      RABBITMQ_DEFAULT_PASS: ${RMQ_PASS:-karaoke}
    volumes:
      - rmq_data:/var/lib/rabbitmq
    ports:
      - "15672:15672"
    networks:
      - karaoke_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: karaoke_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: karaoke_searxng
    restart: unless-stopped
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    networks:
      - karaoke_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: karaoke_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://karaoke:${PG_PASSWORD:-karaoke}@postgres:5432/karaoke
      S3_BUCKET: karaoke
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_PRESIGNED_URL_BASE: ${S3_PRESIGNED_URL_BASE:-http://localhost:9000}
      RABBITMQ_URL: amqp://${RMQ_USER:-karaoke}:${RMQ_PASS:-karaoke}@rabbitmq:5672/
      REC_SERVICE_URL: http://rec-service:8001
      REC_SERVICE_TIMEOUT: "5.0"
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    volumes:
      - media_data:/data/media
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  rec-service:
    build:
      context: .
      dockerfile: docker/rec-service.Dockerfile
    container_name: karaoke_rec_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://${RMQ_USER:-karaoke}:${RMQ_PASS:-karaoke}@rabbitmq:5672/
      S3_BUCKET: karaoke
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NORMALIZATION_STATS_PATH: /data/models/normalization_stats.json
      REC_CLUSTER_CENTROIDS_PATH: /data/models/rec_cluster_centroids.json
      CATALOG_DATA_PATH: /data/models/catalog_data.json
      HTTP_PORT: "8001"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HF_HUB_OFFLINE: "1"
    volumes:
      - models_data:/data/models
    expose:
      - "8001"
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: karaoke_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - karaoke_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pg_data:
  minio_data:
  rmq_data:
  qdrant_data:
  media_data:
  models_data:

networks:
  karaoke_net:
    driver: bridge
