# GPU worker overlay — requires NVIDIA GPU + nvidia-container-toolkit
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  worker:
    build:
      context: .
      dockerfile: docker/worker-gpu.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      WORKER_MODE: gpu
      PG_DSN: postgresql://karaoke:${PG_PASSWORD:-karaoke}@postgres:5432/karaoke
      S3_BUCKET: karaoke
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      RABBITMQ_URL: amqp://${RMQ_USER:-karaoke}:${RMQ_PASS:-karaoke}@rabbitmq:5672/
      MEDIA_ROOT: /data/media
      MODEL_CACHE_DIR: /data/models
      POLL_INTERVAL_SEC: ${WORKER_POLL_INTERVAL:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      NORMALIZATION_STATS_PATH: ${NORMALIZATION_STATS_PATH:-/data/models/feature_normalization_stats.json}
      REC_CLUSTER_CENTROIDS_PATH: ${REC_CLUSTER_CENTROIDS_PATH:-/data/models/rec_cluster_centroids.json}
      # GPU-specific
      UVR_MODEL_NAME: ${UVR_MODEL_NAME:-model_bs_roformer_ep_317_sdr_12.9755.ckpt}
      UVR_TORCH_DEVICE: cuda
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-tiny}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      VAD_TOP_DB: ${VAD_TOP_DB:-16}
      # OpenAI (Whisper API / embedder in API mode)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Lyrics agent (DeepSeek + Yandex Search)
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      YANDEX_SEARCH_API_KEY: ${YANDEX_SEARCH_API_KEY:-}
      YANDEX_SEARCH_FOLDER_ID: ${YANDEX_SEARCH_FOLDER_ID:-}
      # Model cache
      HF_HOME: /data/models/huggingface
    volumes:
      - media_data:/data/media
      - models_data:/data/models
      - ctc_model:/root/ctc_forced_aligner
    networks:
      - karaoke_net
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 24G
