# v3-rc1 production overrides — GPU worker + bind mounts
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  qdrant:
    volumes:
      - /root/qdrant_storage:/qdrant/storage

  backend:
    volumes:
      - /root/bootstrap_output:/data/sqlite:rw
      - /root/bootstrap_output:/data/media:rw

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - DATABASE_URL=/data/sqlite/karaoke.db
      - MEDIA_ROOT=/data/media
      - MODEL_CACHE_DIR=/data/models
      - NORMALIZATION_STATS_PATH=/data/sqlite/feature_normalization_stats.json
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - UVR_MODEL_NAME=model_bs_roformer_ep_317_sdr_12.9755.ckpt
      - UVR_TORCH_DEVICE=cuda
      - WHISPER_MODEL_SIZE=tiny
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=float16
      - VAD_TOP_DB=35
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - GENIUS_TOKEN=${GENIUS_TOKEN}
      - WORKER_ID=worker-1
      - LOG_LEVEL=INFO

    volumes:
      - /root/bootstrap_output:/data/sqlite:rw
      - /root/bootstrap_output:/data/media:rw
      - /root/models:/data/models:rw

    restart: unless-stopped

  frontend:
    ports:
      - "80:80"
